<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#F8F5F0"/>

  <!-- Section title -->
  <text x="300" y="38" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#C4522A" letter-spacing="4">UI COMPONENTS</text>
  <line x1="100" y1="48" x2="500" y2="48" stroke="#E8DDD0" stroke-width="1"/>

  <!-- ======== ROW 1: Buttons ======== -->
  <text x="44" y="80" font-family="sans-serif" font-size="9" fill="#B0906E" letter-spacing="2">BUTTONS</text>

  <!-- Primary button -->
  <rect x="44" y="90" width="120" height="36" rx="18" fill="#C4522A"/>
  <text x="104" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" fill="white">送信する</text>

  <!-- Outline button -->
  <rect x="180" y="90" width="120" height="36" rx="18" fill="transparent" stroke="#C4522A" stroke-width="1.5"/>
  <text x="240" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#C4522A">詳しく見る</text>

  <!-- Ghost / text button -->
  <rect x="316" y="90" width="100" height="36" rx="4" fill="transparent"/>
  <text x="366" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#888">スキップ</text>
  <line x1="330" y1="126" x2="402" y2="126" stroke="#DDD" stroke-width="1"/>

  <!-- Disabled button -->
  <rect x="432" y="90" width="120" height="36" rx="18" fill="#E8E0D8"/>
  <text x="492" y="113" text-anchor="middle" font-family="sans-serif" font-size="12" fill="#B8A898">無効ボタン</text>

  <!-- ======== ROW 2: Form inputs ======== -->
  <line x1="44" y1="148" x2="556" y2="148" stroke="#EDE5DC" stroke-width="1"/>
  <text x="44" y="168" font-family="sans-serif" font-size="9" fill="#B0906E" letter-spacing="2">FORM</text>

  <!-- Input: default -->
  <rect x="44" y="178" width="240" height="40" rx="6" fill="white" stroke="#DDD5CA" stroke-width="1.5"/>
  <text x="58" y="203" font-family="sans-serif" font-size="12" fill="#CCC">お名前を入力</text>

  <!-- Input: focused -->
  <rect x="304" y="178" width="240" height="40" rx="6" fill="white" stroke="#C4522A" stroke-width="2"/>
  <text x="318" y="203" font-family="sans-serif" font-size="12" fill="#555">田中 太郎</text>
  <!-- Focus cursor -->
  <line x1="374" y1="188" x2="374" y2="208" stroke="#C4522A" stroke-width="1.5" opacity="0.8"/>

  <!-- Label badges -->
  <rect x="44" y="170" width="32" height="14" rx="2" fill="#F5EDE4"/>
  <text x="60" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4522A">default</text>
  <rect x="304" y="170" width="28" height="14" rx="2" fill="#FDE8DE"/>
  <text x="318" y="180" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#C4522A">focus</text>

  <!-- ======== ROW 3: Card + Toggle ======== -->
  <line x1="44" y1="238" x2="556" y2="238" stroke="#EDE5DC" stroke-width="1"/>
  <text x="44" y="258" font-family="sans-serif" font-size="9" fill="#B0906E" letter-spacing="2">CARD &amp; TOGGLE</text>

  <!-- Card -->
  <rect x="44" y="268" width="280" height="108" rx="10" fill="white" stroke="#EDE5DC" stroke-width="1" filter="url(#shadow)"/>
  <defs>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#C8B8A8" flood-opacity="0.2"/>
    </filter>
  </defs>
  <!-- Card accent bar -->
  <rect x="44" y="268" width="280" height="5" rx="10" fill="#C4522A"/>
  <rect x="44" y="271" width="280" height="2" fill="#C4522A"/>
  <!-- Card content -->
  <rect x="62" y="286" width="140" height="14" rx="3" fill="#E8D8C8" opacity="0.7"/>
  <rect x="62" y="308" width="240" height="10" rx="2" fill="#E0D4C4" opacity="0.5"/>
  <rect x="62" y="324" width="200" height="10" rx="2" fill="#E0D4C4" opacity="0.4"/>
  <rect x="62" y="348" width="80" height="22" rx="11" fill="#C4522A" opacity="0.85"/>
  <text x="102" y="363" text-anchor="middle" font-family="sans-serif" font-size="10" fill="white">もっと見る</text>

  <!-- Toggles -->
  <text x="360" y="285" font-family="sans-serif" font-size="10" fill="#888">通知を受け取る</text>
  <!-- Toggle ON -->
  <rect x="360" y="295" width="52" height="28" rx="14" fill="#C4522A"/>
  <circle cx="400" cy="309" r="11" fill="white"/>

  <text x="360" y="350" font-family="sans-serif" font-size="10" fill="#888">メルマガ購読</text>
  <!-- Toggle OFF -->
  <rect x="360" y="358" width="52" height="28" rx="14" fill="#DDD5CA"/>
  <circle cx="373" cy="372" r="11" fill="white"/>

  <!-- Bottom label -->
  <text x="300" y="393" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#B0906E" letter-spacing="2">シンプルなUIデザイン</text>
</svg>
