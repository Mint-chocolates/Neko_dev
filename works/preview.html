<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Works プレビュー</title>
  <style>
    body { background: #F5F0EA; font-family: sans-serif; padding: 40px; }
    h1 { color: #C4522A; font-size: 16px; letter-spacing: 4px; text-align: center; margin-bottom: 40px; }
    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1240px; margin: 0 auto; }
    .card { background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 16px rgba(180,130,100,0.12); }
    .card img { width: 100%; display: block; }
    .card p { text-align: center; padding: 12px; color: #B0906E; font-size: 12px; letter-spacing: 2px; }
  </style>
</head>
<body>
  <h1>WORKS / 制作イメージ</h1>
  <div class="grid">
    <div class="card">
      <img src="work-01-website.svg" alt="架空サイトデザイン">
      <p>架空サイトデザイン</p>
    </div>
    <div class="card">
      <img src="work-02-banner.svg" alt="バナー制作">
      <p>バナー制作</p>
    </div>
    <div class="card">
      <img src="work-03-cat.svg" alt="猫モチーフのデザイン">
      <p>猫モチーフのデザイン</p>
    </div>
    <div class="card">
      <img src="work-04-ui.svg" alt="シンプルなUIデザイン">
      <p>シンプルなUIデザイン</p>
    </div>
  </div>
</body>
</html>
