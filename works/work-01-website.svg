<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Background -->
  <rect width="600" height="400" fill="#FAF7F2"/>

  <!-- Browser chrome -->
  <rect x="30" y="20" width="540" height="360" rx="10" fill="white" stroke="#E0D8CF" stroke-width="1.5"/>
  <!-- Top bar -->
  <rect x="30" y="20" width="540" height="36" rx="10" fill="#F0EBE3"/>
  <rect x="30" y="44" width="540" height="12" fill="#F0EBE3"/>
  <!-- Dots -->
  <circle cx="54" cy="38" r="5" fill="#F08080"/>
  <circle cx="70" cy="38" r="5" fill="#F5C842"/>
  <circle cx="86" cy="38" r="5" fill="#70C97A"/>
  <!-- Address bar -->
  <rect x="180" y="29" width="240" height="18" rx="9" fill="white" stroke="#DDD5CA" stroke-width="1"/>
  <text x="300" y="42" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#AAA">myportfolio.com</text>

  <!-- Site Header -->
  <rect x="30" y="56" width="540" height="48" fill="#C4522A"/>
  <rect x="56" y="70" width="70" height="16" rx="3" fill="rgba(255,255,255,0.35)"/>
  <rect x="388" y="73" width="36" height="10" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="432" y="73" width="36" height="10" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="476" y="73" width="36" height="10" rx="2" fill="rgba(255,255,255,0.3)"/>
  <rect x="520" y="70" width="36" height="16" rx="8" fill="rgba(255,255,255,0.25)"/>

  <!-- Hero section -->
  <rect x="30" y="104" width="540" height="130" fill="#FDF0E6"/>
  <!-- Hero text blocks -->
  <rect x="60" y="128" width="190" height="24" rx="4" fill="#C4522A" opacity="0.75"/>
  <rect x="60" y="160" width="260" height="11" rx="2" fill="#B0A090" opacity="0.5"/>
  <rect x="60" y="178" width="230" height="11" rx="2" fill="#B0A090" opacity="0.4"/>
  <rect x="60" y="200" width="80" height="20" rx="10" fill="#C4522A" opacity="0.8"/>
  <!-- Hero image -->
  <rect x="380" y="114" width="160" height="110" rx="6" fill="#EDDEC8"/>
  <ellipse cx="460" cy="195" rx="45" ry="30" fill="#D4A882" opacity="0.5"/>
  <circle cx="460" cy="164" r="28" fill="#C49060" opacity="0.6"/>
  <!-- Cat face hint -->
  <circle cx="450" cy="158" r="4" fill="#7A4020" opacity="0.5"/>
  <circle cx="470" cy="158" r="4" fill="#7A4020" opacity="0.5"/>
  <path d="M455,168 Q460,173 465,168" stroke="#7A4020" stroke-width="1.5" fill="none" opacity="0.5"/>

  <!-- Cards row -->
  <rect x="56" y="250" width="150" height="118" rx="7" fill="white" stroke="#EDE5DC" stroke-width="1"/>
  <rect x="225" y="250" width="150" height="118" rx="7" fill="white" stroke="#EDE5DC" stroke-width="1"/>
  <rect x="394" y="250" width="150" height="118" rx="7" fill="white" stroke="#EDE5DC" stroke-width="1"/>
  <!-- Card tops -->
  <rect x="56" y="250" width="150" height="44" rx="7" fill="#F5EDE4"/>
  <rect x="225" y="250" width="150" height="44" rx="7" fill="#F0EDE8"/>
  <rect x="394" y="250" width="150" height="44" rx="7" fill="#F5EDE4"/>
  <!-- Card bottom rect fix -->
  <rect x="56" y="278" width="150" height="16" fill="#F5EDE4"/>
  <rect x="225" y="278" width="150" height="16" fill="#F0EDE8"/>
  <rect x="394" y="278" width="150" height="16" fill="#F5EDE4"/>
  <!-- Card text lines -->
  <rect x="68" y="304" width="90" height="9" rx="2" fill="#C8B8A8" opacity="0.6"/>
  <rect x="68" y="319" width="120" height="9" rx="2" fill="#C8B8A8" opacity="0.4"/>
  <rect x="68" y="334" width="100" height="9" rx="2" fill="#C8B8A8" opacity="0.35"/>
  <rect x="237" y="304" width="90" height="9" rx="2" fill="#C8B8A8" opacity="0.6"/>
  <rect x="237" y="319" width="120" height="9" rx="2" fill="#C8B8A8" opacity="0.4"/>
  <rect x="237" y="334" width="100" height="9" rx="2" fill="#C8B8A8" opacity="0.35"/>
  <rect x="406" y="304" width="90" height="9" rx="2" fill="#C8B8A8" opacity="0.6"/>
  <rect x="406" y="319" width="120" height="9" rx="2" fill="#C8B8A8" opacity="0.4"/>
  <rect x="406" y="334" width="100" height="9" rx="2" fill="#C8B8A8" opacity="0.35"/>

  <!-- Label -->
  <text x="300" y="390" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#B0906E" letter-spacing="2">架空サイトデザイン</text>
</svg>
