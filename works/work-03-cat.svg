<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <!-- Background gradient-style (layered rects) -->
  <rect width="600" height="400" fill="#C4522A"/>
  <rect width="600" height="400" fill="url(#bgGrad)"/>
  <defs>
    <radialGradient id="bgGrad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#D4622A"/>
      <stop offset="100%" stop-color="#8B2800"/>
    </radialGradient>
  </defs>

  <!-- Decorative circles background -->
  <circle cx="300" cy="180" r="160" fill="rgba(255,255,255,0.06)"/>
  <circle cx="300" cy="180" r="130" fill="rgba(255,255,255,0.04)"/>

  <!-- === CAT ILLUSTRATION === -->
  <!-- Body -->
  <ellipse cx="300" cy="295" rx="70" ry="65" fill="#1A1008"/>
  <!-- Chest patch -->
  <ellipse cx="300" cy="305" rx="30" ry="35" fill="#2E2010"/>

  <!-- Head -->
  <circle cx="300" cy="200" r="66" fill="#1A1008"/>

  <!-- Left ear outer -->
  <polygon points="248,158 232,112 275,148" fill="#1A1008"/>
  <!-- Left ear inner -->
  <polygon points="252,154 244,124 270,148" fill="#8B2800" opacity="0.7"/>
  <!-- Right ear outer -->
  <polygon points="352,158 368,112 325,148" fill="#1A1008"/>
  <!-- Right ear inner -->
  <polygon points="348,154 356,124 330,148" fill="#8B2800" opacity="0.7"/>

  <!-- Eyes (closed / sleepy) -->
  <!-- Left eye -->
  <path d="M272,193 Q282,183 292,193" stroke="#C4522A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Right eye -->
  <path d="M308,193 Q318,183 328,193" stroke="#C4522A" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  <!-- Eye shine dots -->
  <circle cx="278" cy="186" r="2" fill="rgba(255,200,150,0.6)"/>
  <circle cx="322" cy="186" r="2" fill="rgba(255,200,150,0.6)"/>

  <!-- Nose -->
  <polygon points="300,207 295,214 305,214" fill="#C4522A" opacity="0.9"/>
  <!-- Mouth -->
  <path d="M295,214 Q300,220 305,214" stroke="#C4522A" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Whiskers left -->
  <line x1="265" y1="212" x2="220" y2="206" stroke="rgba(255,220,180,0.5)" stroke-width="1.5"/>
  <line x1="265" y1="218" x2="220" y2="218" stroke="rgba(255,220,180,0.5)" stroke-width="1.5"/>
  <line x1="265" y1="224" x2="222" y2="230" stroke="rgba(255,220,180,0.5)" stroke-width="1.5"/>
  <!-- Whiskers right -->
  <line x1="335" y1="212" x2="380" y2="206" stroke="rgba(255,220,180,0.5)" stroke-width="1.5"/>
  <line x1="335" y1="218" x2="380" y2="218" stroke="rgba(255,220,180,0.5)" stroke-width="1.5"/>
  <line x1="335" y1="224" x2="378" y2="230" stroke="rgba(255,220,180,0.5)" stroke-width="1.5"/>

  <!-- Tail -->
  <path d="M368,300 Q420,260 410,210 Q400,180 420,170" stroke="#1A1008" stroke-width="18" fill="none" stroke-linecap="round"/>
  <path d="M368,300 Q420,260 410,210 Q400,180 420,170" stroke="#2E2010" stroke-width="10" fill="none" stroke-linecap="round"/>

  <!-- Paws -->
  <ellipse cx="268" cy="348" rx="22" ry="14" fill="#1A1008"/>
  <ellipse cx="332" cy="348" rx="22" ry="14" fill="#1A1008"/>
  <!-- Toe lines -->
  <line x1="262" y1="340" x2="260" y2="352" stroke="#2E2010" stroke-width="1.5"/>
  <line x1="268" y1="338" x2="268" y2="352" stroke="#2E2010" stroke-width="1.5"/>
  <line x1="274" y1="340" x2="276" y2="352" stroke="#2E2010" stroke-width="1.5"/>
  <line x1="326" y1="340" x2="324" y2="352" stroke="#2E2010" stroke-width="1.5"/>
  <line x1="332" y1="338" x2="332" y2="352" stroke="#2E2010" stroke-width="1.5"/>
  <line x1="338" y1="340" x2="340" y2="352" stroke="#2E2010" stroke-width="1.5"/>

  <!-- Text / Title area -->
  <text x="300" y="54" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="rgba(255,220,190,0.8)" letter-spacing="6">NEKO DESIGN</text>
  <!-- Decorative line -->
  <line x1="160" y1="64" x2="248" y2="64" stroke="rgba(255,220,190,0.35)" stroke-width="1"/>
  <line x1="352" y1="64" x2="440" y2="64" stroke="rgba(255,220,190,0.35)" stroke-width="1"/>

  <!-- Bottom label -->
  <text x="300" y="384" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="rgba(255,220,190,0.7)" letter-spacing="2">猫モチーフのデザイン</text>
</svg>
